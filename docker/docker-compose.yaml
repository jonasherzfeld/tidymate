services:
  tidymate:
    container_name: tidymate
    image: tidymate:dev
    restart: always
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    ports:
      - 3030:3030
    environment:
      FLASK_SECRET_KEY: "your_secret_key"
      LOG_DEBUG: "True"
      VAPID_PRIVATE_KEY: "your_vapid_private_key"
      VAPID_PUBLIC_KEY: "your_vapid_public_key"
