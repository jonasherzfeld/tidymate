services:
  tidymate:
    container_name: tidymate
    image: tidymate:dev
    restart: always
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    ports:
      - 3030:3030
    environment:
      LOG_DEBUG: "True"
      # FLASK_SECRET_KEY and VAPID_{PRIVATE,PUBLIC}_KEY are auto-generated
      # on first boot and persisted to /app/data/secrets.env. Set them here
      # only if you need to override (e.g. sharing keys across instances).
